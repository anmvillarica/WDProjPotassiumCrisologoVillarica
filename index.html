<!DOCTYPE html>
<html lang="en">
<head>
    <title>KeyCODE!</title>
    
    <link rel="stylesheet" href="./styles/KC_UI.css">
    <link rel="icon" href="../media/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&display=swap" rel="stylesheet">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <meta name="author" content="Crisologo & Villarica">

<style>
body{
    background-color: #262626;
}

/* NAVBAR */
ul.navbar a {
    color: #262626;
    text-decoration: none;
    font-size: 2vw;
    padding: 10px 18px;
    border-radius: 10px;
    transition: 0.25s;
    font-weight: bold;
}

.titleart {
    width: 70vw;
    display: block;
    margin: auto;
}

/* LEVELS */
ul.level {
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 5vw;
}

ul.level li {
    width: 20vw;
    height: 25vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

ul.level a {
    text-decoration: none;
    color: #262626;
    font-weight: bold;
}
</style>
</head>

<body>
<header> 
    <ul class="navbar">
        <li><a href="index.html">
        <i class="fa fa-fw fa-home homeicon"></i>
        </a></li>

        <li><a href="./public/how2play.html">INSTRUCTIONS</a></li>
        <li><a href="./public/background.html">BACKGROUND</a></li>
        <li><a href="./public/aboutus.html">ABOUT US</a></li>
        <li><img src="./media/ducky.PNG" id="pfp" class="menu" onclick="menu()"></li>
    </ul>
</header>

<div id="acc_details" class="menu"></div>

<img class="titleart" src="./media/homepage/title_art.png">

<ul class="level">
    <li style="background-color:#579dff">
        <a href="./public/level1.html">
            LEVEL 1 <br>[EASY]
        </a>
        <p id="prog1" class="progress-text">0%</p>
    </li>

    <li style="background-color:#08ff98">
        <a href="./public/level2.html">
            LEVEL 2 <br>[MEDIUM]
        </a>
        <p id="prog2" class="progress-text">0%</p>
    </li>

    <li style="background-color:#ffee0b">
        <a href="./public/level3.html">
            LEVEL 3 <br>[HARD]
        </a>
        <p id="prog3" class="progress-text">0%</p>
    </li>
</ul>

<script>
        const acc_space = document.getElementById('acc_details');
        const LEVEL = ["Lvl1", "Lvl2", "Lvl3"];

function getAcc() {
    let users = JSON.parse(localStorage.getItem('users')) || []; 
    let currUser = Number(localStorage.getItem("curr")) || 0;      
    
    let toAdd = "";

    if (currUser != 0 && users[currUser - 1]) {
        let acc = users[currUser - 1];

        toAdd += `<h3 class="username-color">${acc.userName}</h3>`;
        
        toAdd += "<div class='acc-actions'>";
        toAdd += "<button class='auth-btn login-btn' onclick='clearAcc()'>Clear Data</button>";
        toAdd += "<button class='auth-btn delete-btn' onclick='logOut()'>Log Out</button>";
        toAdd += "<button class='auth-btn signup-btn' onclick='logIn()'>Change Account</button>";
        toAdd += "</div>";
        document.getElementById("pfp").style.backgroundColor = "#579dff";
    } 
    else {
        toAdd += "<div class='acc-actions'>";
        toAdd += "<button class='auth-btn login-btn' onclick='logIn()'>Log In</button>";
        toAdd += "<button class='auth-btn signup-btn' onclick='makeAcc()'>Make an Account</button>";
        toAdd += "<button class='auth-btn delete-btn' onclick='localStorage.clear(); getAcc();'>Delete ALL Data</button>";
        toAdd += "</div>";
    }

    acc_space.innerHTML = toAdd; 
}

        function makeAcc() {
            let newAcc = {}; 
            
            newAcc.userName = window.prompt("Enter a username: ", "Hawak_Mo_Ba_Ang_Beat");
            newAcc.passWord = window.prompt("Enter a password: ", "Hawak_Mo_Ba_Ang_Gabi");
            
                if (!newAcc.userName || !newAcc.passWord) {
                    alert("Invalid ❌");
                    return;
                }

                for (let i = 0; i < LEVEL.length; i++) {
                    newAcc[LEVEL[i]] = 0;
                }

                let users = JSON.parse(localStorage.getItem("users")) || [];
                users.push(newAcc);

                localStorage.setItem("users", JSON.stringify(users));
                localStorage.setItem("curr", users.length);

                getAcc();
                showProgress();
        }

        function logIn() {
                let users = JSON.parse(localStorage.getItem("users")) || [];

                if (!users.length) {
                    alert("Please make an account first! 🙏");
                    return;
                }

                let userName = prompt("Enter your username:");
                let passWord = prompt("Enter your password:");

                let found = false;

                for (let i = 0; i < users.length; i++) {
                    if (users[i].userName === userName &&
                        users[i].passWord === passWord) {

                        localStorage.setItem("curr", i + 1);
                        found = true;
                        break;
                    }
                }

                if (found) {
                    getAcc();
                    showProgress();
                } else {
                    alert("Incorrect username or password ❌");
                }
}

        function logOut() {
            localStorage.setItem("curr", 0);
            document.getElementById("pfp").style.backgroundColor = "#262626";
            getAcc();
            showProgress();
        }

        function clearAcc() {
            let users = JSON.parse(localStorage.getItem("users")) || [];
            let currUser = Number(localStorage.getItem("curr")) || 0;

            if (currUser !== 0 && users[currUser - 1]) {
                for (let i = 0; i < LEVEL.length; i++) {
                    users[currUser - 1][LEVEL[i]] = 0;
                }

                localStorage.setItem("users", JSON.stringify(users));
                getAcc();
                showProgress();
            } 
            
            else {
                alert("Please log in first! 🙏");
            }
}

function showProgress() {
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let currUser = Number(localStorage.getItem("curr")) || 0;

    if (currUser === 0 || !users[currUser - 1]) return;

    let acc = users[currUser - 1];

    document.getElementById("prog1").innerText = (acc.Lvl1 || 0) + "%";
    document.getElementById("prog2").innerText = (acc.Lvl2 || 0) + "%";
    document.getElementById("prog3").innerText = (acc.Lvl3 || 0) + "%";
}

// auto load
window.onload = function () {
    getAcc();
    showProgress();
};

// orientation thingy
if (window.matchMedia("(orientation: portrait)").matches) {
    alert("Please use landscape mode! 😊");
}

function menu(){
    if (document.getElementById("acc_details").style.display != "block") 
        document.getElementById("acc_details").style.display = "block"; 
    else 
        document.getElementById("acc_details").style.display = "none";     
}
    </script>
    </body>
    </html>
