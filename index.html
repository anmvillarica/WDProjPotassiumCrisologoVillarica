<!DOCTYPE html>
<html lang="en">
<head>
    <title>KeyCODE!</title>
    
    <link rel="stylesheet" href="./styles/KC_UI.css">
    <link rel="icon" href="../media/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&display=swap" rel="stylesheet">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <meta name="author" content="Crisologo & Villarica">

<style>
body{
    background-color: #262626;
}
/* NAVBAR */
ul.navbar a {
    color: #262626;
    text-decoration: none;
    font-size: 2vw;
    padding: 10px 18px;
    border-radius: 10px;
    transition: 0.25s;
    font-weight: bold;
}

.titleart {
    width: 70vw; height: auto; 
    display: block;
    margin: auto;
    padding: 0; 
}

/* LEVELS */
ul.level {
    list-style: none;
    margin: auto;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 5vw;
    width: 100%;
}

ul.level li {
    text-decoration: none;
    width: 20vw;
    height: 25vh;
    margin-bottom: 5vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

ul.level a {
    text-decoration: none;
    color: #262626;
    font-weight: bold;
}

ul.level a:hover {
    color: white;
    transition: 0.25s;
}

</style>

</head>
</style>
</head>

<body onload="getAcc()">
    <header> 
        <ul class="navbar">
            <li><a href="index.html">
            <i class="fa fa-fw fa-home homeicon"></i>
            </a></li>

            <li><a href="./public/how2play.html">INSTRUCTIONS</a></li>
            <li><a href="./public/background.html">BACKGROUND</a></li>
            <li><a href="./public/aboutus.html">ABOUT US</a></li>
        </ul>
    </header>

    <div id="acc_details">
    </div>

    <div>
        <img class="titleart" src="./media/homepage/title_art.png" alt="Title Art">
    </div>

    <ul class="level">
        <li style="background-color:#579dff"><a href="./public/level1.html"> LEVEL 1 <br> [EASY]</a></li>
        <li style="background-color:#08ff98"><a href="./public/level2.html"> LEVEL 2 <br> [MEDIUM]</a></li>
        <li style="background-color:#ffee0b"><a href="./public/level3.html"> LEVEL 3 <br> [HARD]</a></li>
    </ul>

    <script>
        var acc_space = document.getElementById('acc_details');
        const LEVEL = ["Lvl1", "Lvl2", "Lvl3"];

        function getAcc() {
            var users = JSON.parse(localStorage.getItem('users')) || []; 
            var currUser = Number(localStorage.getItem("curr")) || 0; 

            if (currUser != 0)
            {   const acc_details = users[currUser - 1]; 

                var toAdd = "";

                toAdd += `<h3>${acc_details.userName}</h3>`;

                for (let i = 0; i < 3; i++)
                {
                    toAdd += `<p>${LEVEL[i]}: ${acc_details[LEVEL[i]]}%</p>`;
                }

                toAdd += "<button onlick='clearAcc()'>Clear Data</button>";
                toAdd += "<button onclick='makeAcc()'Make New Account</button>";
                toAdd += "<button onclick='logIn()'>Change Account</button>";
            }
            else {
                var toAdd = "";

                toAdd += "<button onclick='logIn()'>Log In</button>";
                toAdd += "<button onclick='makeAcc()'>Make an Account</button>";
                toAdd += "<button onclick='localStorage.clear()'>Delete ALL Data</button>";
            }

            acc_space.innerHTML = toAdd; 
        }

        function makeAcc() {
            var newAcc = {}; 
            
            newAcc.userName = window.prompt("Enter a username: ", "Hawak_Mo_Ba_Ang_Beat");
            newAcc.passWord = window.prompt("Enter a password: ", "Hawak_Mo_Ba_Ang_Gabi");
            
            for (idx in LEVEL){
                newAcc[LEVEL[idx]] = 0; 
            }

            console.log(newAcc);

            var users = JSON.parse(localStorage.getItem("users")) || []; 

            users.push(newAcc);

            console.log(users);

            localStorage.setItem("users", JSON.stringify(users));
            for (idx in users)
            {
                if (users[idx] == newAcc)
                    localStorage.setItem("curr", idx + 1);
            }

            getAcc();
        }

        function logIn() {
            var users = JSON.parse(localStorage.getItem("users")) ||  [];
            var tryUser = {};

            if (users.length) {
                var notCorrect = true; 

                while (notCorrect) {
                    tryUser.userName = window.prompt("Enter your username: ");
                    tryUser.passWord = window.prompt("Enter your password: ");

                    for (i in users) {
                        if (users[i].userName == tryUser.username && users[i].password == tryUser.password){
                            localStorage.setItem("curr", i + 1);
                            notCorrect = false;
                            getAcc();

                            break; 
                        }
                    }
                }
            }
            else {
                alert("Please make an account first! 🙏");
            }
        }

        function clearAcc() {
            var users = JSON.parse(localStorage.getItem("users")) ||  [];
            var currUser = Number(localStorage.getItem("curr")) || 0;

            if (currUser != 0) {
                for (i in LEVEL) {
                    users[currUser - 1][LEVEL[i]] = 0;
                }

                localStorage.setItem("users", JSON.stringify(users));

                console.log("cleared");
                getAcc();
            }
            else {
                alert("Please log in first! 🙏");
            }
        }
            
        if (window.matchMedia("(orientation: portrait)").matches) {
            alert("Please use landscape mode! 😊")
        }
    </script>
    </body>
    </html>
